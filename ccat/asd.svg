<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 500" width="100%" height="100%" style="background: #fefce8; border-radius: 16px;">
    <defs>
        <linearGradient id="gradMove" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6366f1" />
            <stop offset="100%" stop-color="#ec4899" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="2" dy="4" stdDeviation="5" flood-opacity="0.2" />
        </filter>
    </defs>

    <!-- 背景网格 -->
    <pattern id="gridPattern" width="30" height="30" patternUnits="userSpaceOnUse">
        <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#e2e8f0" stroke-width="0.8"/>
    </pattern>
    <rect width="800" height="500" fill="url(#gridPattern)" opacity="0.5"/>

    <!-- 标题文字 -->
    <text x="400" y="50" font-family="system-ui, 'Segoe UI', sans-serif" font-size="24" font-weight="bold" fill="#1e1b4b" text-anchor="middle" letter-spacing="1">✨ 独立 SVG 动画 + Base64 内嵌图片 ✨</text>
    <text x="400" y="78" font-family="monospace" font-size="13" fill="#475569" text-anchor="middle">文件: asd.svg | 动画: 旋转 / 平移 / 脉冲</text>

    <!-- 1. 移动的渐变滑板 -->
    <g filter="url(#shadow)">
        <rect x="0" y="420" width="110" height="42" rx="21" fill="url(#gradMove)">
            <animate attributeName="x" values="-120; 820; -120" dur="6s" repeatCount="indefinite" />
        </rect>
        <text x="0" y="445" font-family="monospace" font-size="15" fill="white" font-weight="bold">
            🛹 动态滑行
            <animate attributeName="x" values="-120; 820; -120" dur="6s" repeatCount="indefinite" />
        </text>
    </g>

    <!-- 2. 脉动光晕圆环 (呼吸效果) -->
    <circle cx="140" cy="240" r="35" fill="none" stroke="#f97316" stroke-width="5" stroke-opacity="0.8">
        <animate attributeName="r" values="30; 55; 30" dur="2.4s" repeatCount="indefinite" />
        <animate attributeName="stroke-opacity" values="0.9; 0.2; 0.9" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <circle cx="140" cy="240" r="16" fill="#ff8c42">
        <animate attributeName="r" values="14; 22; 14" dur="2.4s" repeatCount="indefinite" />
    </circle>
    <text x="140" y="290" font-family="Arial" font-size="12" fill="#c2410c" text-anchor="middle">✨ 脉冲核心</text>

    <!-- ★★★ 核心测试点: Base64 编码图片 (旋转动画) ★★★ -->
    <!-- 生成一个内嵌的base64图片: 一个可爱的星形徽章 + 笑脸 -->
    <!-- 为了演示，下面使用的base64对应一个清爽的橙色徽章，含笑脸和星星 -->
    <!-- 注意: 为了确保显示稳定，直接使用预先生成的有效base64（SVG格式图片） -->
    <!-- 图片内容: 60x60 圆形笑脸+星星装饰，保证旋转清晰 -->
    <g transform="translate(560, 240)">
        <g>
            <!-- 旋转整个组 -->
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="5s" repeatCount="indefinite" />
            <!-- 辅助炫光圆圈反向旋转增加动感 -->
            <circle cx="0" cy="0" r="62" fill="none" stroke="#a78bfa" stroke-width="2" stroke-dasharray="5 5">
                <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="7s" repeatCount="indefinite" />
            </circle>
            <!-- Base64 图片 (data:image/svg+xml;base64, 一个友好的卡通头像) -->
            <!-- 生成一个包含笑脸+星星的迷你SVG，转换为base64串 -->
            <image href="data:image/svg+xml;base64," x="-45" y="-45" width="90" height="90" style="filter: drop-shadow(0 6px 8px rgba(0,0,0,0.2));" />
        </g>
    </g>
    <text x="560" y="330" font-family="system-ui" font-size="14" fill="#4c1d95" text-anchor="middle" font-weight="500">🔄 旋转的 Base64 图像 (内置笑脸🌟)</text>

    <!-- 3. 额外动态曲线 -->
    <path d="M 680 380 Q 730 340 780 380" fill="none" stroke="#3b82f6" stroke-width="5" stroke-linecap="round">
        <animate attributeName="d" values="M 680 380 Q 730 340 780 380; M 680 380 Q 730 420 780 380; M 680 380 Q 730 340 780 380" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="stroke" values="#3b82f6;#f97316;#3b82f6" dur="3s" repeatCount="indefinite" />
    </path>
    <text x="730" y="410" font-size="12" fill="#334155" text-anchor="middle">🌈 动态波浪</text>

    <!-- 底部文字 -->
    <text x="400" y="480" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">✅ 本 SVG 完全自托管 | Base64 图像内嵌 + SMIL 动画 | 无外部网络请求</text>
</svg>